services:
  postgres:
    image: ml-postgres:latest
    env_file: .env
    volumes:
      - postgres_data:/var/lib/pgsql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  odoo:
    image: ml-odoo:latest
    env_file: .env
    ports:
      - "8069:8069"
    volumes:
      - odoo_data:/var/lib/odoo
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  odoo_data:
